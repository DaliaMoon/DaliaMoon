name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate Snake SVG
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          gif_out_path: dist/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push to output branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Checkout ou criar branch output
          git fetch origin output 2>/dev/null || echo "Branch output não existe ainda"
          git checkout --orphan output 2>/dev/null || git checkout output
          
          # Copiar arquivos gerados
          cp dist/github-contribution-grid-snake.svg github-contribution-grid-snake.svg
          cp dist/github-contribution-grid-snake-dark.svg github-contribution-grid-snake-dark.svg
          
          # Fazer commit
          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg
          git commit -m "🐍 Update snake contribution grid" --allow-empty
          git push -u origin output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
